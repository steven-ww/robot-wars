name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew :backend:build

    - name: Run Tests
      run: ./gradlew :backend:test

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: backend/build/reports/tests/

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Run Checkstyle
      run: ./gradlew :backend:checkstyleMain :backend:checkstyleTest

  native-build:
    name: Native Build
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
      image-tag: ${{ github.sha }}

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build Native Image
      run: ./gradlew :backend:build -Dquarkus.package.type=native -Dquarkus.native.container-build=true

    - name: Build Docker Image
      run: |
        cd backend
        docker build -f src/main/docker/Dockerfile.native -t quarkus/robot-wars-backend-native .

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: af-south-1
        web-identity-token-file: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Push Docker Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: robot-wars-backend
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker tag quarkus/robot-wars-backend-native $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker tag quarkus/robot-wars-backend-native $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [native-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: af-south-1
        web-identity-token-file: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}

    - name: Deploy to EC2 via SSM
      env:
        ECR_REGISTRY: ${{ needs.native-build.outputs.ecr-registry }}
        ECR_REPOSITORY: robot-wars-backend
        CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'robot-wars-backend' }}
        CONTAINER_PORT: ${{ vars.CONTAINER_PORT || '8080' }}
        AWS_REGION: af-south-1
        INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      run: |
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --region "$AWS_REGION" \
          --parameters commands="[
            \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
            \"docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest\",
            \"docker stop $CONTAINER_NAME || true\",
            \"docker rm $CONTAINER_NAME || true\",
            \"docker run -d --name $CONTAINER_NAME -p $CONTAINER_PORT:8080 --restart unless-stopped $ECR_REGISTRY/$ECR_REPOSITORY:latest\",
            \"docker image prune -f\"
          ]" \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command ID: $COMMAND_ID"

        # Wait for the command to complete
        aws ssm wait command-executed \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" \
          --region "$AWS_REGION"

        # Print output
        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id "$INSTANCE_ID" \
          --region "$AWS_REGION" \
          --query "[StandardOutputContent, StandardErrorContent]" \
          --output text

    - name: Update Route 53 A record for API endpoint
      env:
        AWS_REGION: af-south-1
        HOSTED_ZONE_ID: ${{ vars.ROUTE53_HOSTED_ZONE_ID }}
        RECORD_NAME: api.rwars.steven-webber.com.
        INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      run: |
        IP=$(aws ec2 describe-instances \
          --instance-ids "$INSTANCE_ID" \
          --query "Reservations[0].Instances[0].PublicIpAddress" \
          --output text \
          --region "$AWS_REGION")

        if [ "$IP" = "None" ] || [ -z "$IP" ]; then
          echo "Failed to resolve public IP for instance $INSTANCE_ID" >&2
          exit 1
        fi

        echo "Updating ${RECORD_NAME} to IP ${IP}"

        cat > change-batch.json <<EOF
        {
          "Comment": "Update API A record from GitHub Actions",
          "Changes": [{
            "Action": "UPSERT",
            "ResourceRecordSet": {
              "Name": "${RECORD_NAME}",
              "Type": "A",
              "TTL": 60,
              "ResourceRecords": [{
                "Value": "${IP}"
              }]
            }
          }]
        }
        EOF

        aws route53 change-resource-record-sets \
          --hosted-zone-id "$HOSTED_ZONE_ID" \
          --change-batch file://change-batch.json
